# MCP OAuth 2.1 Discovery (RFC 8414)
# Required for Claude.ai Custom Connector auto-discovery.
#
# Add these rules to httpdocs/.htaccess (WHMCS root), BEFORE any
# existing WHMCS rewrite rules.
#
# The issuer is origin-only (https://desenv.ntweb.com.br), so Claude.ai
# constructs the discovery URL as:
#   https://desenv.ntweb.com.br/.well-known/oauth-authorization-server
#
# These rules forward that to oauth.php which already handles the
# PATH_INFO routing for metadata endpoints.

RewriteEngine On
RewriteRule ^\.well-known/oauth-authorization-server/?$ /modules/addons/nt_mcp/oauth.php/.well-known/oauth-authorization-server [L,QSA]
RewriteRule ^\.well-known/openid-configuration/?$ /modules/addons/nt_mcp/oauth.php/.well-known/openid-configuration [L,QSA]
